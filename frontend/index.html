<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Garage Sale</title>
  <link rel="stylesheet" href="/static/style.css?v=2">
</head>
<body>

  <div id="no-crypto-banner" class="banner hidden">
    ⚠️ Must be opened over HTTPS — crypto unavailable. Open <strong>https://</strong> instead.
  </div>

  <!-- ── Setup ─────────────────────────────────────────────────────────── -->
  <div id="view-setup" class="view hidden">
    <div class="view-inner">
      <h1>Garage Sale Setup</h1>
      <p class="muted">Enter once before the sale.</p>

      <label class="field-label">Server URL
        <input id="setup-url" type="url" inputmode="url"
               placeholder="https://garage.yoskos.com" autocomplete="off">
      </label>

      <label class="field-label">Shared Secret
        <input id="setup-secret" type="text" inputmode="text"
               placeholder="paste the secret from the deploy output" autocomplete="off">
      </label>

      <button id="setup-test-btn" class="btn secondary">Test Connection</button>
      <div id="setup-test-result" class="test-result hidden"></div>

      <button id="setup-save-btn" class="btn primary">Save &amp; Continue</button>
    </div>
  </div>

  <!-- ── Capture ───────────────────────────────────────────────────────── -->
  <div id="view-capture" class="view hidden">
    <img src="/static/garage-sale-header.png" class="capture-header" alt="Yosko's Garage Sale">

    <div class="capture-body">
      <input type="file" id="photo-input" accept="image/*" capture="environment" class="hidden">

      <div class="capture-section">
        <h3 class="section-title">Get Price</h3>
        <div class="section-row">
          <button id="shutter-btn" class="action-circle" aria-label="Take photo">
            <span class="action-icon">📷</span>
          </button>
          <button id="notes-toggle" class="link-btn">+ Add notes</button>
        </div>
        <div id="photo-strip" class="photo-strip hidden"></div>
        <input type="text" id="notes-input" class="notes-input hidden"
               placeholder="e.g. works, missing remote" maxlength="200">
        <button id="get-price-btn" class="btn primary hidden">Get Price</button>
      </div>

      <div class="capture-section">
        <h3 class="section-title">Add Sale</h3>
        <div id="sale-input-area">
          <div class="sale-input-row">
            <textarea id="quick-sale-text" class="quick-sale-textarea" rows="2" maxlength="500"
                      placeholder="e.g. sold a blue lamp for $5"></textarea>
            <button id="quick-sale-mic-btn" class="mic-circle" aria-label="Record">🎤</button>
          </div>
          <button id="quick-sale-analyze-btn" class="btn primary hidden">Log Sale</button>
        </div>
        <div id="quick-sale-confirm" class="hidden">
          <div class="quick-sale-result">
            <span id="quick-sale-item" class="quick-sale-item"></span>
            <span id="quick-sale-price" class="quick-sale-price"></span>
          </div>
          <div class="quick-sale-row">
            <button id="quick-sale-confirm-btn" class="btn primary">Confirm Sale</button>
            <button id="quick-sale-edit-btn" class="btn secondary">Edit</button>
          </div>
        </div>
        <p id="quick-sale-error" class="error small hidden"></p>
      </div>

      <div class="bottom-icons">
        <button id="capture-settings-btn" class="bottom-icon-btn" aria-label="Settings">
          <span>⚙️</span><span class="bottom-icon-label">Settings</span>
        </button>
        <button id="capture-history-btn" class="bottom-icon-btn" aria-label="Ledger">
          <span>📒</span><span class="bottom-icon-label">Ledger</span>
        </button>
      </div>

      <div id="capture-error" class="error-box hidden">
        <span id="capture-error-msg"></span>
        <button id="retry-btn" class="btn secondary small">Retry</button>
      </div>
    </div>

    <div id="loading-overlay" class="overlay hidden">
      <div class="overlay-content">
        <div id="status-label" class="status-label">Preparing…</div>
        <div class="progress-track">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
        <div id="elapsed-display" class="elapsed-small">0s</div>
      </div>
    </div>
  </div>

  <!-- ── Result ────────────────────────────────────────────────────────── -->
  <div id="view-result" class="view hidden">
    <div class="view-inner">
      <div class="result-card">
        <div class="result-top">
          <h2 id="result-item" class="result-item"></h2>
          <span id="result-cached" class="badge hidden">cached</span>
        </div>
        <div id="result-price" class="result-price"></div>
        <div id="result-range" class="result-range"></div>
        <div id="result-retail" class="result-retail hidden"></div>
        <hr class="divider">
        <div id="result-condition" class="muted small"></div>
        <div id="result-rationale" class="muted small"></div>
      </div>

      <div id="sold-form" class="sold-form hidden">
        <label class="field-label inline">
          Sold for $
          <input type="number" id="sold-price-input" min="0" step="0.5"
                 inputmode="decimal" class="price-input">
        </label>
        <div class="sold-form-btns">
          <button id="sold-confirm-btn" class="btn primary">Confirm</button>
          <button id="sold-cancel-btn" class="btn secondary">Cancel</button>
        </div>
      </div>

      <div id="result-actions" class="result-actions">
        <button id="sold-btn" class="btn primary">Sold</button>
        <button id="not-sold-btn" class="btn secondary">Not sold</button>
        <button id="refine-btn" class="link-btn">Add notes &amp; retry</button>
        <button id="reshoot-btn" class="link-btn">Re-shoot</button>
      </div>

      <div id="refine-form" class="sold-form hidden">
        <input type="text" id="refine-notes-input" class="notes-input"
               placeholder="e.g. works perfectly, vintage 1970s" maxlength="200">
        <div class="sold-form-btns">
          <button id="refine-retry-btn" class="btn primary">Try again</button>
          <button id="refine-cancel-btn" class="btn secondary">Cancel</button>
        </div>
      </div>

      <div id="result-error" class="error-box hidden">
        <span id="result-error-msg"></span>
      </div>
    </div>
  </div>

  <!-- ── History ───────────────────────────────────────────────────────── -->
  <div id="view-history" class="view hidden">
    <div class="top-bar">
      <button id="history-back-btn" class="link-btn">← Back</button>
      <span class="top-title">Ledger</span>
      <div class="top-bar-right">
        <button id="history-refresh-btn" class="link-btn">Refresh</button>
        <button id="ledger-download-btn" class="link-btn">⬇ CSV</button>
      </div>
    </div>
    <div class="search-bar">
      <input id="search-input" type="search" class="search-input"
             placeholder="Search all priced items…" autocomplete="off">
    </div>
    <div id="search-results" class="view-inner hidden"></div>
    <div id="history-content" class="view-inner"></div>
  </div>

  <!-- ── Ledger modal ──────────────────────────────────────────────────── -->
  <div id="ledger-modal" class="modal-backdrop hidden">
    <div class="modal">
      <button id="modal-close-btn" class="modal-close">×</button>
      <p id="modal-time" class="modal-time"></p>
      <h3 id="modal-item" class="modal-item"></h3>
      <p id="modal-price" class="modal-price"></p>
      <div id="modal-view-actions" class="modal-btns">
        <button id="modal-edit-btn" class="btn secondary">Edit</button>
        <button id="modal-del-btn" class="btn secondary modal-del-btn">Delete</button>
      </div>
      <div id="modal-edit-form" class="modal-edit-form hidden">
        <input id="modal-edit-name" type="text" class="ledger-edit-name" maxlength="200">
        <input id="modal-edit-price" type="number" class="ledger-edit-price" min="0" step="0.5">
        <div class="modal-btns">
          <button id="modal-save-btn" class="btn primary">Save</button>
          <button id="modal-cancel-edit-btn" class="btn secondary">Cancel</button>
        </div>
      </div>
      <p id="modal-error" class="error small hidden"></p>
    </div>
  </div>

  <script src="/static/app.js" type="module"></script>
</body>
</html>
